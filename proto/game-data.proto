syntax = "proto3";

package game_data;

// ===== SERVICE DEFINITION =====
service GameDataService {
  // Map base
  rpc GetAllMap (Empty) returns (GetAllMapResponse);
  rpc ThemMap (ThemMapRequest) returns (MapBase);
  rpc SuaMap (SuaMapRequest) returns (MapBase);
  rpc XoaMap (XoaMapRequest) returns (Empty);
  rpc GetNpcTheoMap (GetNpcTheoMapRequest) returns (GetNpcTheoMapResponse);

  // Npc base
  rpc GetAllNpcBase (Empty) returns (GetAllNpcBaseResponse);
  rpc ThemNpcBase (ThemNpcBaseRequest) returns (NpcBase);
  rpc SuaNpcBase (SuaNpcBaseRequest) returns (NpcBase);
  rpc XoaNpcBase (XoaNpcBaseRequest) returns (Empty);

  // Npc spawn
  rpc ThemNpcSpawn (ThemNpcSpawnRequest) returns (NpcSpawn);
  rpc SuaNpcSpawn (SuaNpcSpawnRequest) returns (NpcSpawn);
  rpc XoaNpcSpawn (XoaNpcSpawnRequest) returns (Empty);

  // Item base
  rpc GetAllItemBase (GetAllItemBaseRequest) returns (GetAllItemBaseResponse);
  rpc ThemItemBase (ThemItemBaseRequest) returns (ThemItemBaseResponse);
  rpc SuaItemBase (SuaItemBaseRequest) returns (SuaItemBaseResponse);
  rpc XoaItemBase (XoaItemBaseRequest) returns (Empty);

  // Npc shop item
  rpc GetShopTheoNpc (GetShopTheoNpcRequest) returns (GetShopTheoNpcResponse);
  rpc ThemShopItem   (ThemShopItemRequest)   returns (NpcShopItem);
  rpc SuaShopItem    (SuaShopItemRequest)    returns (NpcShopItem);
  rpc XoaShopItem    (XoaShopItemRequest)    returns (XoaShopItemResponse);
}

// ===== COMMON =====
message Empty {}

// ===== MAP BASE =====
message MapBase {
  int32  id  = 1;
  string ten = 2;
}

message GetAllMapResponse {
  repeated MapBase maps = 1;
}

message ThemMapRequest {
  string ten = 1;
}

message SuaMapRequest {
  int32  id  = 1;
  string ten = 2;
}

message XoaMapRequest {
  int32 id = 1;
}

// ===== NPC BASE =====
message NpcBase {
  int32  id   = 1;
  string ten  = 2;
  string loai = 3; // NGUOI, CAYDAU, RUONGDO, DUIGA
}

message GetAllNpcBaseResponse {
  repeated NpcBase npcs = 1;
}

message ThemNpcBaseRequest {
  string ten  = 1;
  string loai = 2;
}

message SuaNpcBaseRequest {
  int32  id   = 1;
  string ten  = 2;
  string loai = 3;
}

message XoaNpcBaseRequest {
  int32 id = 1;
}

// ===== NPC SPAWN =====
message NpcSpawn {
  int32  id          = 1;
  int32  npc_base_id = 2;
  string ten_npc     = 3; // join từ npc_base để client khỏi query thêm
  string loai_npc    = 4;
  int32  map_id      = 5;
  string ten_map     = 6; // join từ map_base
  float  x           = 7;
  float  y           = 8;
  bool   is_active   = 9;
}

message GetNpcTheoMapRequest {
  int32 map_id = 1;
}

message GetNpcTheoMapResponse {
  repeated NpcSpawn npcs = 1;
}

message ThemNpcSpawnRequest {
  int32 npc_base_id = 1;
  int32 map_id      = 2;
  float x           = 3;
  float y           = 4;
  bool  is_active   = 5;
}

message SuaNpcSpawnRequest {
  int32 id        = 1;
  int32 map_id    = 2;
  float x         = 3;
  float y         = 4;
  bool  is_active = 5;
}

message XoaNpcSpawnRequest {
  int32 id = 1;
}

// ===== NPC SHOP ITEM =====
message NpcShopItem {
  int32  id           = 1;
  int32  npc_base_id  = 2;
  string ten_npc      = 3;
  int32  item_base_id = 4;  
  string ten_item     = 5;  // ← join từ item_base
  string ma_item      = 6;  // ← join từ item_base
  int64  gia          = 7;
  string loaiTien     = 8;
  string tab          = 9;
  bool   is_active    = 10;
  optional int64 start_at = 11;  // epoch millis, null = bán ngay
  optional int64 end_at   = 12;  // epoch millis, null = vô thời hạn
}

message GetShopTheoNpcRequest {
  int32 npc_base_id = 1;
}

message GetShopTheoNpcResponse {
  repeated NpcShopItem items = 1;
}

message ThemShopItemRequest {
  int32  npc_base_id  = 1;
  int32  item_base_id = 2;  
  int64  gia          = 3;
  string loaiTien     = 4;
  string tab          = 5;
  optional bool is_active    = 6;
  optional int64 start_at = 7;
  optional int64 end_at   = 8;
}

message SuaShopItemRequest {
  int32  id           = 1;
  optional int32  item_base_id = 2;
  optional int64  gia          = 3;
  optional string loaiTien     = 4;
  optional string tab          = 5;
  optional bool   is_active    = 6;
  optional int64  start_at     = 7;
  optional int64  end_at       = 8;
}

message XoaShopItemRequest {
  int32 id = 1;
}

message XoaShopItemResponse {
  int32 npcId = 1;
}

// ===== ITEM BASE =====
message ItemBase {
  int32  id  = 1;
  string ten = 2;
  string ma  = 3;
}

message GetAllItemBaseRequest {}

message GetAllItemBaseResponse {
  repeated ItemBase items = 1;
}

message ThemItemBaseRequest {
  string ten = 1;
  string ma  = 2;
}

message ThemItemBaseResponse {
  ItemBase item = 1;
}

message SuaItemBaseRequest {
  int32  id  = 1;
  string ten = 2;
  string ma  = 3;
}

message SuaItemBaseResponse {
  ItemBase item = 1;
}

message XoaItemBaseRequest {
  int32 id = 1;
}